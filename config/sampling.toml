# Poly-Cleaner 配置文件
# 自适应采样参数配置

[sampling]
# 基础采样间隔 (小时)
base_interval_hours = 1

# 采样间隔限制
min_interval_minutes = 1
max_interval_hours = 24

# 波动率阈值
high_volatility_threshold = 0.02    # 高波动: 1-5分钟采样
medium_volatility_threshold = 0.005 # 中波动: 15-30分钟采样
low_volatility_threshold = 0.001    # 低波动: 1-6小时采样

# 变化率阈值
velocity_threshold_per_hour = 0.01
acceleration_threshold_per_hour_squared = 0.005

# 变化点检测
change_point_detection_window_size = 24
change_point_confidence_level = 0.95
change_point_min_samples = 12

# 采样策略
volatility_multiplier = 10.0
decay_factor = 0.9
stable_period_hours = 2

[api]
# API 端点
gamma_api_base_url = "https://gamma-api.polymarket.com"
clob_api_base_url = "https://clob.polymarket.com"

# 请求配置
max_retries = 3
timeout_seconds = 30
rate_limit_per_minute = 60

# 并发配置
max_concurrent_requests = 16

[database]
# 数据库配置
url = "sqlite:///data/polymarket.db"
wal_mode = true
cache_size_mb = 64

[markets]
# 市场过滤
min_volume = 1000
max_markets = 1000
categories = ["politics", "economics", "sports", "crypto"]

[logging]
level = "info"
file = "logs/polymarket.log"
max_file_size_mb = 100
